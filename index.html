<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sheglo</title>
  <meta name="description" content="do you have 1 minute for yourself?" />

  <!-- OG / social -->
  <meta property="og:title" content="sheglo" />
  <meta property="og:description" content="do you have 1 minute for yourself?" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://sheglo.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="sheglo app" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="sheglo" />
  <meta name="twitter:description" content="do you have 1 minute for yourself?" />
  <meta name="twitter:image" content="https://sheglo.app/og-image.png" />

  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <style>
    :root {
      /* SheGlo palette */
      --coral:        #F4845F;
      --hot-pink:     #E03E79;
      --hot-pink-2:   #F06482;
      --deep-plum:    #6B2D5B;
      --golden:       #F2C94C;
      --lavender:     #D5A6E6;
      --warm-white:   #FFF8F5;
      --dark-text:    #3C1E37;
      --muted-text:   #8C6F85;
      --page-bg:      #FFFFFF;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    html { background: var(--warm-white); }
    body {
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--dark-text);
      font-family: ui-rounded, -apple-system-rounded, "SF Pro Rounded",
                   -apple-system, system-ui, "Segoe UI", Roboto, Oxygen, Ubuntu,
                   "Nunito", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ---- Layout ---- */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem 6rem;
      position: relative;
      background: var(--page-bg);
    }

    @media (min-width: 1024px) {
      .page {
        flex-direction: row;
        padding: 2rem 2rem 6rem;
      }
    }

    .copy {
      width: 100%;
      max-width: 720px;
    }

    @media (min-width: 1024px) {
      .copy { margin-right: 4rem; }
    }

    /* ---- Headline ---- */
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2.75rem, 7vw, 6rem);
      font-weight: 600;
      line-height: 1.08;
      letter-spacing: -0.01em;
      color: #000;
    }
    @media (min-width: 640px) { h1 { margin-bottom: 0.75rem; } }

    h1 .accent {
      font-weight: 700;
      background: linear-gradient(92deg, var(--coral) 0%, var(--hot-pink) 55%, var(--deep-plum) 120%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      margin: 0 0 3rem;
      font-size: clamp(1.125rem, 2.2vw, 1.875rem);
      line-height: 1.35;
      color: #6B6B78;
      font-weight: 400;
    }
    @media (min-width: 640px) { .tagline { margin-bottom: 3.5rem; } }

    .tagline .accent {
      font-weight: 600;
      background: linear-gradient(92deg, var(--coral), var(--hot-pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ---- App Store CTA ---- */
    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .app-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      background: #000;
      color: #fff;
      border-radius: 14px;
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
      min-width: 220px;
      line-height: 1;
    }
    .app-badge:hover { opacity: 0.9; transform: translateY(-1px); }

    .app-badge svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      fill: #fff;
    }

    .app-badge .b-small {
      display: block;
      font-size: 0.7rem;
      opacity: 0.85;
      letter-spacing: 0.02em;
      margin-bottom: 2px;
    }
    .app-badge .b-big {
      display: block;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.005em;
    }

    @media (min-width: 640px) { .app-badge { min-width: 250px; } }

    /* ---- Right-side hero visual (empty container for demo video) ---- */
    .hero-visual {
      width: 100%;
      max-width: 350px;
      aspect-ratio: 9 / 19.5;
      margin-top: 2.5rem;
      border-radius: 2rem;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(120% 80% at 20% 0%, rgba(245,198,162,0.75), transparent 60%),
        radial-gradient(110% 90% at 90% 20%, rgba(213,166,230,0.55), transparent 55%),
        linear-gradient(160deg, var(--coral) 0%, var(--hot-pink) 55%, var(--deep-plum) 100%);
      box-shadow:
        0 30px 80px -20px rgba(224, 62, 121, 0.35),
        0 10px 30px -10px rgba(107, 45, 91, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (min-width: 1024px) {
      .hero-visual { width: 350px; margin-top: 0; }
    }

    /* Subtle shimmer so the empty frame feels alive until a video is dropped in */
    .hero-visual::after {
      content: "";
      position: absolute;
      inset: -20%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(255, 248, 245, 0.15) 40deg,
        transparent 80deg,
        transparent 360deg
      );
      animation: spin 14s linear infinite;
      pointer-events: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Video (if/when Matt drops one in) */
    .hero-visual video,
    .hero-visual img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ---- Footer ---- */
    footer {
      position: absolute;
      bottom: 1rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted-text);
    }
    footer a {
      color: inherit;
      text-decoration: none;
      margin: 0 0.5rem;
      transition: color 0.15s ease;
    }
    footer a:hover { color: var(--dark-text); }
    footer .sep { opacity: 0.55; }
    footer .copyright { display: block; margin-top: 0.35rem; font-size: 0.8rem; }
  </style>
</head>
<body>
  <main class="page">
    <div class="copy">
      <h1>
        your phone is taking you<br />
        <span class="accent">away from yourself</span>
      </h1>

      <p class="tagline">
        block apps until you <span class="accent">glow</span>
      </p>

      <div class="cta-row">
        <a
          class="app-badge"
          href="https://apps.apple.com/us/app/sheglo/id6760979651"
          aria-label="Download sheglo on the App Store"
        >
          <!-- Apple logo -->
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M17.543 12.673c-.026-2.62 2.14-3.877 2.238-3.938-1.221-1.786-3.12-2.03-3.795-2.058-1.616-.164-3.154.952-3.974.952-.82 0-2.088-.928-3.436-.902-1.768.026-3.4 1.027-4.31 2.608-1.838 3.186-.47 7.904 1.32 10.494.874 1.266 1.914 2.688 3.28 2.638 1.318-.053 1.816-.852 3.407-.852 1.59 0 2.044.852 3.438.824 1.42-.026 2.319-1.292 3.183-2.566 1.004-1.473 1.418-2.9 1.444-2.974-.03-.014-2.77-1.064-2.795-4.226zM14.96 5.08c.728-.884 1.219-2.112 1.085-3.336-1.049.043-2.318.698-3.07 1.58-.675.783-1.266 2.034-1.108 3.232 1.17.09 2.365-.593 3.093-1.476z"/>
          </svg>
          <span>
            <span class="b-small">Download on the</span>
            <span class="b-big">App Store</span>
          </span>
        </a>
      </div>
    </div>

    <div class="hero-visual" aria-hidden="true">
      <!-- demo video will be dropped in here, e.g.:
      <video autoplay muted loop playsinline src="/demo.mp4"></video>
      -->
    </div>

    <footer>
      <a href="/terms.html">Terms of Service</a>
      <span class="sep">•</span>
      <a href="/privacy.html">Privacy Policy</a>
      <span class="sep">•</span>
      <a href="mailto:info@sheglo.app">Contact Us</a>
      <span class="copyright">© 2026 SheGlo. All rights reserved.</span>
    </footer>
  </main>
</body>
</html>
