  <style>
    :root {
      /* SheGlo palette */
      --coral:        #F4845F;
      --hot-pink:     #E03E79;
      --hot-pink-2:   #F06482;
      --deep-plum:    #6B2D5B;
      --golden:       #F2C94C;
      --lavender:     #D5A6E6;
      --warm-white:   #FFF8F5;
      --dark-text:    #3C1E37;
      --muted-text:   #8C6F85;
      --page-bg:      #FDF8F5;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    html { background: var(--page-bg); }
    body {
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--dark-text);
      font-family: ui-rounded, -apple-system-rounded, "SF Pro Rounded",
                   -apple-system, system-ui, "Segoe UI", Roboto, Oxygen, Ubuntu,
                   "Nunito", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ---- Layout ---- */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem 6rem;
      position: relative;
      background: var(--page-bg);
    }

    @media (min-width: 1024px) {
      .page {
        flex-direction: row;
        padding: 2rem 2rem 6rem;
      }
    }

    .copy {
      width: 100%;
      max-width: 720px;
    }

    @media (min-width: 1024px) {
      .copy { margin-right: 4rem; }
    }

    /* ---- Headline ---- */
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2.75rem, 7vw, 6rem);
      font-weight: 600;
      line-height: 1.08;
      letter-spacing: -0.01em;
      color: #000;
    }
    @media (min-width: 640px) { h1 { margin-bottom: 0.75rem; } }

    h1 .accent {
      font-weight: 700;
      background: linear-gradient(92deg, var(--coral) 0%, var(--hot-pink) 55%, var(--deep-plum) 120%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      margin: 0 0 3rem;
      font-size: clamp(1.125rem, 2.2vw, 1.875rem);
      line-height: 1.35;
      color: #6B6B78;
      font-weight: 400;
    }
    @media (min-width: 640px) { .tagline { margin-bottom: 3.5rem; } }

    .tagline .accent {
      font-weight: 600;
      background: linear-gradient(92deg, var(--coral), var(--hot-pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ---- App Store CTA ---- */
    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .app-badge {
      display: inline-block;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .app-badge:hover { opacity: 0.9; transform: translateY(-1px); }

    .app-badge img {
      display: block;
      width: 180px;
      height: auto;
      object-fit: contain;
    }
    @media (min-width: 640px) { .app-badge img { width: 220px; } }
    @media (min-width: 768px) { .app-badge img { width: 250px; } }

    /* ---- Right-side hero visual (seamless — video floor matches page bg) ---- */
    .hero-visual {
      width: 100%;
      max-width: 350px;
      aspect-ratio: 9 / 19.5;
      margin-top: 2.5rem;
      position: relative;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (min-width: 1024px) {
      .hero-visual { width: 350px; margin-top: 0; }
    }

    /* Video (sits flush on the page, no container chrome).
       Kite scene bg is #FDF8F5 (matches --page-bg) so the phone
       blends seamlessly with no masks required. */
    .hero-visual video,
    .hero-visual img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ---- Footer ---- */
    footer {
      position: absolute;
      bottom: 1rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted-text);
    }
    footer a {
      color: inherit;
      text-decoration: none;
      margin: 0 0.5rem;
      transition: color 0.15s ease;
    }
    footer a:hover { color: var(--dark-text); }
    footer .sep { opacity: 0.55; }
    footer .copyright { display: block; margin-top: 0.35rem; font-size: 0.8rem; }

    /* ---- Brand (logo + wordmark) ----
       Mobile: flows in document, pinned to left, sits above headline.
       Desktop: absolutely positioned in the top-left corner. */
    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      z-index: 10;
      align-self: flex-start;
      margin-bottom: 2rem;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .brand:hover { opacity: 0.92; transform: translateY(-1px); }

    @media (min-width: 1024px) {
      .brand {
        position: absolute;
        top: 2rem;
        left: 2.25rem;
        margin-bottom: 0;
        gap: 0.7rem;
      }
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      display: block;
      box-shadow: 0 6px 18px -6px rgba(224, 62, 121, 0.4);
    }
    @media (min-width: 1024px) {
      .brand-logo { width: 46px; height: 46px; border-radius: 12px; }
    }

    .brand-name {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.015em;
      background: linear-gradient(92deg, var(--coral), var(--hot-pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    @media (min-width: 1024px) {
      .brand-name { font-size: 1.85rem; }
    }
  </style>

  <!-- Mixpanel -->
  <script type="text/javascript">

    mixpanel.init('d630f727c94bfaa952767a0803a3dd79', { debug:false, track_pageview:false, persistence:'localStorage', ignore_dnt:true });

    (function(){
      var params = new URLSearchParams(window.location.search);
      var trackedKeys = ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','ttclid','tt_medium','fbclid','gclid'];
      var captured = {};
      trackedKeys.forEach(function(k){
        var v = params.get(k);
        if (v) { captured[k]=v; try{localStorage.setItem('sg_'+k,v);}catch(e){} }
        else { try{var s=localStorage.getItem('sg_'+k); if(s)captured[k]=s;}catch(e){} }
      });
      function whenReady(cb) {
        if (window.mixpanel && typeof window.mixpanel.get_distinct_id === 'function') return cb();
        var tries = 0;
        var iv = setInterval(function(){
          tries++;
          if (window.mixpanel && typeof window.mixpanel.get_distinct_id === 'function') { clearInterval(iv); cb(); }
          else if (tries > 100) { clearInterval(iv); }
        }, 50);
      }

      whenReady(function(){
        mixpanel.register(captured);
        var distinctId = mixpanel.get_distinct_id();
        try{localStorage.setItem('sg_distinct_id', distinctId);}catch(e){}
        mixpanel.track('Landing Page View', Object.assign({page:'landing',referrer:document.referrer||null,landing_path:window.location.pathname}, captured));
        attachLinks(distinctId);
      });

      function attachLinks(distinctId){
        // Match both /go/ redirect link and direct App Store link
        var sel = 'a[href^="/go"], a[href*="apps.apple.com"]';
        document.querySelectorAll(sel).forEach(function(a){
          try {
            // a.href resolves relative URLs against current origin
            var url = new URL(a.href);
            url.searchParams.set('sg_did', distinctId);
            Object.keys(captured).forEach(function(k){ if(captured[k]) url.searchParams.set(k, captured[k]); });
            a.href = url.toString();
          } catch(e){}
          a.addEventListener('click', function(){
            var payload = JSON.stringify(Object.assign({sg_did:distinctId, ts:Date.now()}, captured));
            try {
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText('sheglo_attr:' + payload).catch(function(){});
              }
            } catch(e){}
            mixpanel.track('App Store Click', Object.assign({destination:'app_store', cta_href:a.getAttribute('href')}, captured));
          }, { passive: true });
        });
      }
    })();
  </script>
  <!-- /Mixpanel -->
</head>
<body>
  <main class="page">
    <a class="brand" href="/">
      <img class="brand-logo" src="sheglo-logo.png" alt="" aria-hidden="true" width="42" height="42" />
      <span class="brand-name">SheGlo</span>
    </a>

    <div class="copy">
      <h1>
        your phone is<br />
        <span class="accent">killing your self-confidence</span>
      </h1>

      <p class="tagline">
        block apps until you <span class="accent">glow</span>
      </p>

      <div class="cta-row">
        <a
          class="app-badge"
          href="/go/"
          aria-label="Download SheGlo on the App Store"
        >
          <img
            src="https://toolbox.marketingtools.apple.com/api/badges/download-on-the-app-store/black/en-us"
            alt="Download on the App Store"
          />
        </a>
      </div>
    </div>

    <div class="hero-visual" aria-hidden="true">
      <video
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        poster="sheglo-poster.jpg"
        src="sheglo-demo.mp4"
      ></video>
    </div>

    <footer>
      <a href="/terms.html">Terms of Service</a>
      <span class="sep">•</span>
      <a href="/privacy.html">Privacy Policy</a>
      <span class="sep">•</span>
      <a href="mailto:info@sheglo.app">Contact Us</a>
      <span class="copyright">© 2026 SheGlo. All rights reserved.</span>
    </footer>
  </main>

  <script>
    // Carry UTM params from the landing-page URL onto the App Store CTA so the
    // /go/ click is attributed to the right source in Cloudflare Web Analytics.
    (function() {
      var params = new URLSearchParams(window.location.search);
      var keep = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
      var carried = keep
        .filter(function(k) { return params.has(k); })
        .map(function(k) { return k + '=' + encodeURIComponent(params.get(k)); })
        .join('&');
      if (carried) {
        document.querySelectorAll('a.app-badge').forEach(function(a) {
          a.href = '/go/?' + carried;
        });
      }
    })();
  </script>
</body>
